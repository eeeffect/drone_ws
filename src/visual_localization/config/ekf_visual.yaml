### ekf config file ###
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    # 1. High frequency raw IMU data from Flight Controller (e.g., MAVROS)
    # Provides roll, pitch, yaw rate, and linear acceleration
    imu0: /imu/data
    imu0_config: [false, false, false, # x, y, z position
                  true,  true,  false, # roll, pitch, yaw
                  false, false, false, # x, y, z velocity
                  false, false, true,  # roll, pitch, yaw velocity
                  true,  true,  true]  # x, y, z acceleration
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: false

    # 2. Low frequency absolute position from our visual localization node
    # Provides X, Y coordinates and Yaw orientation
    pose0: /visual_pose
    pose0_config: [true,  true,  false, # x, y, z position
                   false, false, true,  # roll, pitch, yaw
                   false, false, false, # x, y, z velocity
                   false, false, false, # roll, pitch, yaw velocity
                   false, false, false] # x, y, z acceleration
    pose0_differential: false
    pose0_relative: false
    
    use_control: false
